version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: board_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: board_app
    volumes:
      - mongodb_data:/data/db
    networks:
      - board_network

networks:
  board_network:
    driver: bridge

volumes:
  mongodb_data: